<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instructor Login - Course Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Online Course Registration System</h1>
    </header>
    
    <nav>
        <a href="index.html">Home</a> | 
        <a href="instructor-login.html">Instructor Login</a> |
        <a href="instructor-schedule.html">Instructor Schedule</a> |
        <a href="session-enrollment.html">Session Enrollment</a>
    </nav>

    <div class="container">
        <h2>Instructor Portal Login</h2>
        <form action="instructor-schedule.html">
            <div class="form-group">
                <label for="username">Instructor ID / Email:</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
